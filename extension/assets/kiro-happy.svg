<svg width="44" height="38" viewBox="0 0 44 38" xmlns="http://www.w3.org/2000/svg" class="kiro-svg kiro-happy">
  <style>
    .kiro-happy .bm-body {
      animation: bm-happy-bounce 1.1s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
      transform-origin: 22px 30px;
    }
    @keyframes bm-happy-bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      40%      { transform: translateY(-2.5px) scale(1.03); }
      60%      { transform: translateY(0) scale(1); }
    }
    .kiro-happy .bm-sparkle {
      animation: bm-twinkle 1.6s ease-in-out infinite;
      transform-origin: center;
    }
    .kiro-happy .bm-sparkle1 { animation-delay: 0s; }
    .kiro-happy .bm-sparkle2 { animation-delay: 0.4s; }
    .kiro-happy .bm-sparkle3 { animation-delay: 0.8s; }
    @keyframes bm-twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.7) rotate(0deg); }
      50%      { opacity: 1;   transform: scale(1.2) rotate(15deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .kiro-happy * { animation: none !important; }
    }
  </style>

  <!-- Sparkles -->
  <g fill="#9098F5">
    <path class="bm-sparkle bm-sparkle1" d="M4 12l0.9 2.2 2.2 0.9-2.2 0.9-0.9 2.2-0.9-2.2-2.2-0.9 2.2-0.9z"/>
    <path class="bm-sparkle bm-sparkle2" d="M38 5l0.6 1.5 1.5 0.6-1.5 0.6-0.6 1.5-0.6-1.5-1.5-0.6 1.5-0.6z"/>
    <path class="bm-sparkle bm-sparkle3" d="M40 18l0.7 1.8 1.8 0.7-1.8 0.7-0.7 1.8-0.7-1.8-1.8-0.7 1.8-0.7z"/>
  </g>

  <g class="bm-body">
    <!-- Body + head silhouette -->
    <path d="M9 37
             C7 37 6 35.5 6 33.5
             V24
             C6 14.5 13 8 22 8
             C31 8 38 14.5 38 24
             V33.5
             C38 35.5 37 37 35 37
             Z"
          fill="#F6F7F9" stroke="#D9DEE5" stroke-width="0.7"/>

    <!-- Happy curved eyes (^_^ style) -->
    <g stroke="#272B33" stroke-width="1.6" stroke-linecap="round" fill="none">
      <path d="M16 19.3c.9-1.6 2.7-1.6 3.6 0"/>
      <path d="M24.4 19.3c.9-1.6 2.7-1.6 3.6 0"/>
    </g>

    <!-- Big happy open mouth -->
    <path d="M19 23.3c1.6 1.8 3.4 1.8 5 0" stroke="#272B33" stroke-width="1.4" stroke-linecap="round" fill="none"/>

    <!-- Arms raised slightly in celebration -->
    <path d="M7 29c-3.4 0.6-5.4 2.4-5 5.2 0.3 1.8 1.8 2.7 3.4 2.4s2.6-1.6 2.3-3.4"
          fill="#F6F7F9" stroke="#D9DEE5" stroke-width="0.7"/>
    <path d="M37 29c3.4 0.6 5.4 2.4 5 5.2-0.3 1.8-1.8 2.7-3.4 2.4s-2.6-1.6-2.3-3.4"
          fill="#F6F7F9" stroke="#D9DEE5" stroke-width="0.7"/>
  </g>
</svg>
