<svg width="46" height="38" viewBox="0 0 46 38" xmlns="http://www.w3.org/2000/svg" class="kiro-svg kiro-wave">
  <style>
    .kiro-wave {
      animation: bm-attention-pulse 1.6s ease-in-out infinite;
      transform-origin: 22px 22px;
    }
    @keyframes bm-attention-pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.04); }
    }
    .kiro-wave .bm-wave-arm {
      animation: bm-wave-motion 0.9s ease-in-out infinite;
      transform-origin: 35px 28px;
    }
    @keyframes bm-wave-motion {
      0%, 100% { transform: rotate(0deg); }
      25%      { transform: rotate(-16deg); }
      75%      { transform: rotate(10deg); }
    }
    .kiro-wave .bm-spark {
      animation: bm-spark-flicker 1.2s ease-in-out infinite;
    }
    .kiro-wave .bm-spark:nth-child(2) { animation-delay: 0.2s; }
    .kiro-wave .bm-spark:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bm-spark-flicker {
      0%, 100% { opacity: 0.4; }
      50%      { opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      .kiro-wave *, .kiro-wave { animation: none !important; }
    }
  </style>

  <!-- Excitement spark lines -->
  <g stroke="#9CA3F5" stroke-width="1.3" stroke-linecap="round">
    <line class="bm-spark" x1="37" y1="7" x2="41" y2="5"/>
    <line class="bm-spark" x1="39" y1="11" x2="43.5" y2="11"/>
    <line class="bm-spark" x1="37" y1="15" x2="41" y2="17"/>
  </g>

  <!-- Body + head silhouette -->
  <path d="M9 37
           C7 37 6 35.5 6 33.5
           V24
           C6 14.5 13 8 22 8
           C31 8 38 14.5 38 24
           V33.5
           C38 35.5 37 37 35 37
           Z"
        fill="#F6F7F9" stroke="#D9DEE5" stroke-width="0.7"/>

  <!-- Friendly eyes -->
  <circle cx="18.2" cy="18.5" r="1.7" fill="#272B33"/>
  <circle cx="25.8" cy="18.5" r="1.7" fill="#272B33"/>

  <!-- Open happy mouth -->
  <path d="M19 23.3c1.6 1.4 3.4 1.4 5 0" stroke="#272B33" stroke-width="1.3" stroke-linecap="round" fill="none"/>

  <!-- Resting hand on the edge -->
  <path d="M6 30c-3 0-5 1.6-5 4.4 0 1.8 1.3 3 3 3s3-1.2 3-3"
        fill="#F6F7F9" stroke="#D9DEE5" stroke-width="0.7"/>

  <!-- Waving arm — rotates from shoulder, swings up above the head -->
  <g class="bm-wave-arm">
    <path d="M35 28c1-4.2 1-8.8 0-12.2"
          stroke="#F6F7F9" stroke-width="5" stroke-linecap="round"/>
    <path d="M35 28c1-4.2 1-8.8 0-12.2"
          stroke="#D9DEE5" stroke-width="0.5" stroke-linecap="round" fill="none"/>
    <circle cx="34.6" cy="13.6" r="3" fill="#F6F7F9" stroke="#D9DEE5" stroke-width="0.7"/>
  </g>
</svg>
