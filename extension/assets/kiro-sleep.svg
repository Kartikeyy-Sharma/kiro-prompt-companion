<svg width="44" height="38" viewBox="0 0 44 38" xmlns="http://www.w3.org/2000/svg" class="kiro-svg kiro-sleep">
  <style>
    .kiro-sleep .bm-body {
      animation: bm-breathe 3.2s ease-in-out infinite;
      transform-origin: 22px 30px;
    }
    @keyframes bm-breathe {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(1.2px); }
    }
    .kiro-sleep .bm-z1 {
      animation: bm-float-z 2.4s ease-in-out infinite;
      transform-origin: center;
    }
    .kiro-sleep .bm-z2 {
      animation: bm-float-z 2.4s ease-in-out infinite 0.5s;
      transform-origin: center;
    }
    @keyframes bm-float-z {
      0%   { opacity: 0; transform: translateY(2px) scale(0.8); }
      30%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-6px) scale(1.1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .kiro-sleep * { animation: none !important; }
    }
  </style>

  <g class="bm-body">
    <!-- Body + head single silhouette -->
    <path d="M9 37
             C7 37 6 35.5 6 33.5
             V24
             C6 14.5 13 8 22 8
             C31 8 38 14.5 38 24
             V33.5
             C38 35.5 37 37 35 37
             Z"
          fill="#ffffff" stroke="#D9DEE5" stroke-width="0.7"/>

    <!-- Closed sleepy eyes -->
    <g stroke="#272B33" stroke-width="1.6" stroke-linecap="round">
      <path d="M16.5 18.5h3.4"/>
      <path d="M24.1 18.5h3.4"/>
    </g>

    <!-- Content sleepy mouth -->
    <path d="M19.5 23c1.6 1.2 3.4 1.2 5 0" stroke="#272B33" stroke-width="1.3" stroke-linecap="round" fill="none"/>

    <!-- Hands resting flat on the chat bar edge -->
    <path d="M6 30c-3 0-5 1.6-5 4.4 0 1.8 1.3 3 3 3s3-1.2 3-3"
          fill="#ffffff" stroke="#D9DEE5" stroke-width="0.7"/>
    <path d="M38 30c3 0 5 1.6 5 4.4 0 1.8-1.3 3-3 3s-3-1.2-3-3"
          fill="#ffffff" stroke="#D9DEE5" stroke-width="0.7"/>
  </g>

  <!-- Floating ZZZ (outside bm-body so it doesn't breathe with the body) -->
  <g fill="#9098F5">
    <text class="bm-z1" x="31" y="9" font-family="-apple-system, Arial, sans-serif" font-size="5.5" font-weight="700">z</text>
    <text class="bm-z2" x="35" y="5.5" font-family="-apple-system, Arial, sans-serif" font-size="7" font-weight="700">Z</text>
  </g>
</svg>
